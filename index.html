<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Project</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="proj.js"></script>
</head>

<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="container p-5 my-5 text-dark shadow-lg rounded w-50 bg-light">
            <div class="text-center mb-3">
                <img src="Logo.png" alt="Logo" width="80">
                <h1 class="mt-2"><strong>Login</strong></h1>
            </div>
            <div class="bg-white p-4 rounded mb-4 shadow-sm">
                <details ontoggle="if(this.open) alert('TEST CREDENTIALS: \nUser: (your username) \nPass: (your password)')">
                    <summary class="btn btn-sm btn-outline-secondary mb-3">View Login Help</summary>
                    <p class="small text-muted">Enter the credentials shown in the alert box.</p>
                </details>
                <div class="row align-items-center">
                    <div class="col-12">
                        <label class="form-label"><strong>Username</strong></label>
                        <input type="text" id="username" class="form-control" placeholder="Enter here"><br>

                        <label class="form-label"><strong>Password</strong></label>
                        <input type="password" id="pass" class="form-control" placeholder="********"><br>

                        <div class="form-check">
                            <input type="checkbox" id="logged" class="form-check-input">
                            <label for="logged" class="form-check-label">Stay logged in</label>
                            <p class="small text-muted">Your session will stay active on this device.</p>
                        </div>
                    </div>
                    <div class="button-container d-flex justify-content-evenly">
                        <button class="btn btn-success mt-4 p-2 w-25" onclick="checkLogin()">Login</button>
                        <button class="btn mt-4 p-2 w-25" onclick="window.location.reload()">Cancel</button>
                    </div>
                </div>
                <hr class="mt-4">
                <p class="text-center mt-3">
                    <a href="https://www.w3schools.com/js/js_if_else.asp" target="_blank" class="text-decoration-none text-muted">
                        <strong>Forgot username/password?</strong>
                    </a>
                </p>
            </div>
        </div>
    </div>
    <footer class="text-center text-white py-3">
        <p class="mb-0"> Zangief Arkin Briones | 9 - Emerald</p>
    </footer>
</body>
</html>
